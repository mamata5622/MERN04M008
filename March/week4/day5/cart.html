<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My cart</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
  </head>
  <body class="flex justify-end bg-gray-500">
    <div class="w-100 bg-gray-100 ">
        <!-- first div -->
      <div class="flex p-5 justify-between bg-white">
        <h2 class="text-[20px]">
            <i class="fa-solid fa-arrow-left"></i>
            My cart
        </h2>
        <button class=" flex hover:bg-gray-200 pl-2 pr-2 items-center gap-1 text-green-500">
            <div class="text-[13px]">
                <i class="fa-solid fa-cart-shopping"></i>
            </div>
            <p class="font-medium">Share</p>
            
        </button>
      </div>
      <!-- second div -->
      <div class="flex items-center ml-5 mr-5 rounded-md gap-2 mt-5 bg-white">
        <div class="rounded-md bg-gray-300 text-[25px] p-1 mt-5 mb-5 ml-5">
            <i class="fa-solid fa-stopwatch"></i>
        </div>
        <div>
            <strong>Delivery in few minutes</strong>
            <p>Shipment of items</p>
        </div>
      </div>
      <!-- third div -->
      <div class="ml-5 mr-5 rounded-md mt-5 pt-5 pb-5 pl-1 bg-white">
        <div class=" font-semibold">Grand total</div>
      </div>
      <!-- Fourth div -->
      <div class="ml-5 mr-5 rounded-md mt-5 pl-1 bg-white">
        <h2 class="font-bold">Cancellation Policy:</h2>
        <p class="">
            Orders cannot be cancelled once packed for delivery. In case of unexpected delays, a refund will be provided, if applicable.
        </p>
      </div>
      <!-- Fifth div -->
      <div class="ml-5 mr-5 rounded-md mt-20 bg-white p-5 flex justify-center mb-1 ">
        <a href="/March/week4/day5/login.html">
            <button class="bg-green-500 p-5 rounded-sm font-bold text-[20px]">
            Login to Proceed 
            <span>
                <i class="fa-solid fa-angle-right"></i>
            </span>
        </button>
        </a>
        
      </div>
    </div>
  </body>
</html>
