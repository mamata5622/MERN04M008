<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body>
    <div class="sm:m-50 border text-center lg:m-80 lg:mr-140 lg:ml-140 ">
        <h2 class="font-bold text-[20px] lg:text-[30px]">Create Account</h2>
        <div class="mt-10">
            <input type="text" placeholder="enter your fullname" class="border p-1"><br>
            <input type="number" placeholder="enter your age" class="mt-3 border p-1"><br>
            <input type="email" placeholder="enter your email" class="mt-3 border p-1"><br>
            <input type="password" placeholder="enter your password" class="mt-3 border p-1">
        </div>
        <button class="border p-1 pl-15 pr-15 rounded mt-3 text-[20px] font-medium bg-blue-900 text-white mb-5">create</button>

    </div>
</body>
</html>
